# Nexitin 订阅模板覆写配置 (v1.0.0)
# 适用类型: Clash / Mihomo

# --- 1. 全局基础设置覆写 ---
mixin:
  port: 7890
  socks-port: 7891
  allow-lan: true
  mode: rule
  log-level: info
  ipv6: false

  # --- 2. DNS 优化覆写（防止 DNS 污染与泄漏） ---
  dns:
    enable: true
    listen: 0.0.0.0:1053
    ipv6: false
    enhanced-mode: fake-ip
    fake-ip-range: 198.18.0.1/16
    default-nameserver:
      - 223.5.5.5
      - 119.29.29.29
    nameserver:
      - https://dns.alicdn.com/dns-query
      - https://doh.pub/dns-query
    fallback:
      - https://doh.dns.sb/dns-query
      - https://dns.cloudflare.com/dns-query
    fallback-filter:
      geoip: true
      geoip-code: CN
      ipcidr:
        - 240.0.0.0/4

  # --- 3. 策略组覆写 (Proxy Groups) ---
  # 这里的 name 必须与下方 rules 中的策略组名称完全对应
  proxy-groups:
    - name: 🚀 节点选择
      type: select
      proxies:
        - ⚡ 自动选择
        - 🔮 负载均衡
        - 🇭🇰 香港节点
        - 🇹🇼 台湾节点
        - 🇯🇵 日本节点
        - 🇺🇸 美国节点
        - DIRECT

    - name: ⚡ 自动选择
      type: url-test
      url: http://cp.cloudflare.com/generate_204
      interval: 300
      tolerance: 50
      # 使用正则筛选所有节点
      filter: "(?i)香港|🇭🇰|日本|🇯🇵|美国|🇺🇸|台湾|🇹🇼|韩国|🇰🇷|SG|SG|HK|JP|US|TW"

    - name: 🔮 负载均衡
      type: load-balance
      url: http://cp.cloudflare.com/generate_204
      interval: 600
      strategy: consistent-hashing
      filter: "(?i)香港|🇭🇰|日本|🇯🇵|美国|🇺🇸|台湾|🇹🇼"

    - name: 🎬 国际媒体
      type: select
      proxies:
        - 🚀 节点选择
        - 🇭🇰 香港节点
        - 🇯🇵 日本节点
        - 🇺🇸 美国节点
        - DIRECT

    - name: 🤖 智能 AI
      type: select
      proxies:
        - 🇺🇸 美国节点
        - 🇯🇵 日本节点
        - 🚀 节点选择

    - name: 🍎 苹果服务
      type: select
      proxies:
        - DIRECT
        - 🚀 节点选择

    - name: 🐟 漏网之鱼
      type: select
      proxies:
        - 🚀 节点选择
        - DIRECT

    # --- 区域节点过滤分组 ---
    - name: 🇭🇰 香港节点
      type: select
      filter: "(?i)香港|🇭🇰|HK|HongKong"
      proxies:
        - DIRECT

    - name: 🇯🇵 日本节点
      type: select
      filter: "(?i)日本|🇯🇵|JP|Japan"
      proxies:
        - DIRECT

    - name: 🇺🇸 美国节点
      type: select
      filter: "(?i)美国|🇺🇸|US|United States"
      proxies:
        - DIRECT

    - name: 🇹🇼 台湾节点
      type: select
      filter: "(?i)台湾|🇹🇼|TW|Taiwan"
      proxies:
        - DIRECT

  # --- 4. 远程规则集覆写 (Rule Providers) ---
  rule-providers:
    reject:
      type: http
      behavior: domain
      url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
      path: ./ruleset/reject.yaml
      interval: 86400

    icloud:
      type: http
      behavior: domain
      url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/icloud.txt"
      path: ./ruleset/icloud.yaml
      interval: 86400

    apple:
      type: http
      behavior: domain
      url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt"
      path: ./ruleset/apple.yaml
      interval: 86400

    google:
      type: http
      behavior: domain
      url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/google.txt"
      path: ./ruleset/google.yaml
      interval: 86400

    proxy:
      type: http
      behavior: domain
      url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt"
      path: ./ruleset/proxy.yaml
      interval: 86400

    direct:
      type: http
      behavior: domain
      url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
      path: ./ruleset/direct.yaml
      interval: 86400

    gfw:
      type: http
      behavior: domain
      url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt"
      path: ./ruleset/gfw.yaml
      interval: 86400

  # --- 5. 分流规则覆写 ---
  rules:
    # 拦截广告
    - RULE-SET,reject,REJECT
    
    # AI 复合规则（OpenAI / Anthropic 等主流 AI 精确分流）
    - DOMAIN-KEYWORD,openai,🤖 智能 AI
    - DOMAIN-KEYWORD,anthropic,🤖 智能 AI
    - DOMAIN-KEYWORD,claude,🤖 智能 AI
    - DOMAIN-SUFFIX,chatgpt.com,🤖 智能 AI
    - DOMAIN-SUFFIX,oaistatic.com,🤖 智能 AI
    - DOMAIN-SUFFIX,oaiusercontent.com,🤖 智能 AI
    
    # 国际媒体分流
    - DOMAIN-SUFFIX,netflix.com,🎬 国际媒体
    - DOMAIN-SUFFIX,netflix.net,🎬 国际媒体
    - DOMAIN-SUFFIX,nflximg.net,🎬 国际媒体
    - DOMAIN-SUFFIX,nflxvideo.net,🎬 国际媒体
    - DOMAIN-SUFFIX,youtube.com,🎬 国际媒体
    - DOMAIN-SUFFIX,googlevideo.com,🎬 国际媒体

    # 基础公共服务
    - RULE-SET,icloud,🍎 苹果服务
    - RULE-SET,apple,🍎 苹果服务
    - RULE-SET,google,🚀 节点选择
    - RULE-SET,proxy,🚀 节点选择
    - RULE-SET,gfw,🚀 节点选择
    - RULE-SET,direct,DIRECT

    # 局域网与国内直连
    - GEOIP,LAN,DIRECT
    - GEOIP,CN,DIRECT
    
    # 兜底规则
    - MATCH,🐟 漏网之鱼
