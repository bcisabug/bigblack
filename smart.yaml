# ███████████████████████████ 规则匹配 ███████████████████████████
rules:
  - DOMAIN,dns.alidns.com,直连
  - DOMAIN,doh.pub,直连
  - DOMAIN,doh.pubdefault,REJECT
  # 1. 局域网与本地直连（最高优先级）
  - RULE-SET,private_ip,直连,no-resolve
  - RULE-SET,private_domain,直连
  # 广告拦截
  - RULE-SET,fakeipfilter_domain,REJECT-DROP
  
  # 2. 自定义特殊绕过与单机代理
  - DOMAIN-SUFFIX,steamserver.net,🎯 直连
  - DOMAIN-SUFFIX,qichiyu.com,默认代理
  - DOMAIN-KEYWORD,xn--,默认代理
  - DOMAIN-KEYWORD,光喵,默认代理
  - DOMAIN-KEYWORD,idsduf,默认代理
  
  # 全网 BT/PT 流量直连
  - DOMAIN-KEYWORD,tracker,直连
  - DOMAIN-KEYWORD,torrent,直连
  - DOMAIN-KEYWORD,peer,直连
  - DST-PORT,6881,直连
  
  # 3. 垂直细分领域代理（MRS 高效匹配）
  - RULE-SET,ai_domain,AI
  - RULE-SET,github_domain,GitHub
  - RULE-SET,youtube_domain,油管
  - RULE-SET,steam_domain,steam
  - RULE-SET,Nintendo_domain,steam
  - RULE-SET,Epic_domain,steam
  - RULE-SET,Origin_domain,steam
  - RULE-SET,google_domain,Google
  - RULE-SET,onedrive_domain,OneDrive
