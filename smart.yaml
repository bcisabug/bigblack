# 名称： Seven1_fallback_Geo_Clashmi_Overwrite_v3
# 说明： 隐藏智能/故转分组，修复 steam 与全部节点的图标错误

# ███████████████████████████ 锚点区域 ███████████████████████████
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}
  yaml: &yaml {type: http, interval: 86400, behavior: domain, format: yaml}



# ███████████████████████████ 核心配置 ███████████████████████████
mode: rule
ipv6: false
mixed-port: 7893
allow-lan: true
bind-address: "*"
log-level: warning
unified-delay: true
tcp-concurrent: true
profile: { store-selected: true, store-fake-ip: true }

# ══ DNS 模块 ══
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:7874
  ipv6: false
  respect-rules: false 
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
    - "rule-set:private_domain"
    - "*.lan"
    - "*.local"
    - "connectivity-check"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - "https://dns.alidns.com/dns-query"
    - "https://doh.pub/dns-query"
  nameserver:
    - "https://dns.alidns.com/dns-query"
    - "https://doh.pub/dns-query"

# ══ 嗅探功能 ══
sniffer:
  enable: true
  parse-pure-ports: true
  sniff:
    TLS: { ports: [443, 8443] }
    HTTP: { ports: [80, 8080-8888], override-destination: true }
  skip-domain:
    - '+.apple.com'
    - '+.netflix.com'



