# ------ 2. 节点正则自动化过滤 ------
香港节点 = select, policy-regex=(?i)港|🇭🇰|hk|hongkong|hong kong
台湾节点 = select, policy-regex=台|(?i)湾|🇹🇼|🇨🇳
日本节点 = select, policy-regex=(?i)日|jp|🇯🇵|japan
狮城节点 = select, policy-regex=(?i)新加坡|坡|狮城|🇸🇬|SG|Singapore
美国节点 = select, policy-regex=(?i)美|🇺🇸|🇺🇲|unitedstates|united states
他国节点 = select, policy-regex=^((?!(套餐|到期|有效|剩余|版本|已用|过期|失联|测试|官方|网址|备用|群|TEST|客服|网站|获取|订阅|流量|机场|下次|官址|联系|邮箱|工单|学术|USE|USED|TOTAL|EXPIRE|EMAIL|官网|距离|更新|订阅|网站|流量|时间|到期|直连官网|距离|更新|订阅|网站|流量|时间|到期|直连|美|🇺🇸|🇺🇲|港|🇭🇰|台|🇹🇼|🇨🇳|日|🇯🇵|新|🇸🇬)).)*$

